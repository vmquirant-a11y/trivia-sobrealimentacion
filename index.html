<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia de Sobrealimentación IA</title>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-size: 2rem;
        }
        .subtitle {
            color: #9ca3af;
            margin: 0;
            font-size: 1rem;
        }
        .card {
            background-color: #1f2937;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #374151;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .hidden {
            display: none !important;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #374151;
            border: 1px solid #4b5563;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            color: white;
        }
        .btn-blue { background-color: #2563eb; }
        .btn-blue:hover { background-color: #1d4ed8; }
        .btn-green { background-color: #16a34a; }
        .btn-green:hover { background-color: #15803d; }
        
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #374151;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .quiz-header h3 { margin: 5px 0 0 0; color: white; }
        .diff-tag { color: #60a5fa; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .progress-text { color: #f59e0b; font-weight: bold; font-size: 1.1rem; margin: 0; }
        .question-text { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 25px; }
        
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-option {
            background-color: #374151;
            border: 1px solid #4b5563;
            text-align: left;
            font-weight: normal;
            color: #e5e7eb;
        }
        .btn-option:hover {
            background-color: #4b5563;
            color: white;
        }
        .registered-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #374151;
        }
        .registered-box p { color: #d1d5db; font-weight: bold; margin-bottom: 10px; }
        ul { padding-left: 20px; margin: 0; color: #9ca3af; }
        li { margin-bottom: 6px; }
        .report-title { color: #4ade80; text-align: center; margin-bottom: 25px; }
        .participant-card {
            background-color: #374151;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #4b5563;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #4b5563;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .card-header h3 { margin: 0; color: #60a5fa; }
        .log-item {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            border-left: 5px solid;
        }
        .log-correct { background-color: rgba(22,163,74,0.15); border-left-color: #16a34a; }
        .log-incorrect { background-color: rgba(220,38,38,0.15); border-left-color: #dc2626; }
        .badge {
            float: right;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .badge-ok { background-color: #14532d; color: #4ade80; }
        .badge-no { background-color: #451a03; color: #f87171; }
        .scroll-box { max-height: 300px; overflow-y: auto; padding-right: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Engine Boost Quiz</h1>
            <p class="subtitle">Pon a prueba tu conocimiento sobre Turbos, Compresores y Sistemas de Sobrealimentación</p>
        </header>

        <!-- PANTALLA 1: REGISTRO -->
        <div id="screen-register" class="card">
            <h2 style="text-align: center; margin-top: 0;">Registro de Participantes</h2>
            
            <div class="form-group">
                <label for="player-name">Nombre del Participante:</label>
                <input type="text" id="player-name" placeholder="Ej. Juan Pérez">
            </div>
            
            <div class="form-group">
                <label for="player-difficulty">Selecciona Dificultad:</label>
                <select id="player-difficulty">
                    <option value="easy">Principiante (15 preguntas)</option>
                    <option value="medium">Intermedio (15 preguntas)</option>
                    <option value="hard">Experto (15 preguntas)</option>
                </select>
            </div>
            
            <div class="btn-group">
                <button type="button" id="btn-start" class="btn-blue">Iniciar Mi Turno</button>
                <button type="button" id="btn-final-report" class="btn-green hidden">Finalizar y Ver Informe</button>
            </div>
            
            <div id="registered-list" class="registered-box hidden">
                <p>Participantes listos en el sistema:</p>
                <ul id="list-names"></ul>
            </div>
        </div>

        <!-- PANTALLA 2: JUEGO -->
        <div id="screen-quiz" class="card hidden">
            <div class="quiz-header">
                <div>
                    <span class="diff-tag" id="quiz-diff-label">Dificultad</span>
                    <h3 id="quiz-player-label">Jugador: </h3>
                </div>
                <div style="text-align: right;">
                    <span style="color: #9ca3af; font-size: 0.85rem;">Progreso</span>
                    <p class="progress-text" id="quiz-progress">Pregunta 1 de 15</p>
                </div>
            </div>

            <p id="quiz-question" class="question-text"></p>

            <div id="quiz-options" class="options-list"></div>
        </div>

        <!-- PANTALLA 3: INFORME FINAL -->
        <div id="screen-report" class="card hidden">
            <h2 class="report-title">Informe de Interacción del Sistema</h2>
            
            <div id="report-content"></div>

            <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #374151;">
                <button type="button" id="btn-restart" class="btn-blue" style="width: auto; padding: 12px 30px;">Reiniciar Todo</button>
            </div>
        </div>
    </div>

    <script>
        const questionBank = {
            easy: [
                { q: "¿Cuál es el objetivo principal de la sobrealimentación en un motor?", o: ["Reducir el consumo de aceite", "Introducir más aire en los cilindros", "Enfriar el líquido refrigerante", "Aumentar el tamaño del cigüeñal"], a: 1 },
                { q: "¿Qué componente utiliza los gases de escape para girar?", o: ["El compresor volumétrico", "El alternador", "El turbocompresor", "La bomba de agua"], a: 2 },
                { q: "¿Qué función tiene el intercooler?", o: ["Enfriar el aire de admisión comprimido", "Calentar el combustible", "Enfriar los gases de escape", "Lubricar el eje del turbo"], a: 0 },
                { q: "¿De dónde toma la energía un compresor mecánico?", o: ["De los gases de escape", "Directamente del cigüeñal mediante correa", "De la batería del coche", "Del sistema de frenos"], a: 1 },
                { q: "¿Qué elemento regula la presión máxima de escape que entra a la turbina?", o: ["La válvula Wastegate (descarga)", "El intercooler", "El medidor de masa de aire", "El cuerpo de aceleración"], a: 0 },
                { q: "¿Qué sustancia lubrica principalmente el eje central de un turbocompresor?", o: ["El líquido de frenos", "El propio combustible", "El aceite del motor", "Grasa de litio"], a: 2 },
                { q: "El retraso en la respuesta del turbo se conoce como:", o: ["Turbo-back", "Turbo lag", "Boost creep", "Blow-off"], a: 1 },
                { q: "¿Qué ocurre con la densidad del aire cuando se comprime?", o: ["Disminuye", "Permanece igual", "Aumenta", "Se vuelve inflamable"], a: 2 },
                { q: "Dónde se instala físicamente el intercooler:", o: ["Dentro del bloque del motor", "Entre el compresor y el colector de admisión", "En el tramo final del tubo de escape", "Debajo del tanque"], a: 1 },
