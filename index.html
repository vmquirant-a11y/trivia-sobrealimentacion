<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Sobrealimentacion</title>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #3b82f6;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .card {
            background-color: #1f2937;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #374151;
        }
        .hidden {
            display: none !important;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #d1d5db;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #374151;
            border: 1px solid #4b5563;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .btn-blue { background-color: #2563eb; }
        .btn-green { background-color: #16a34a; }
        
        .quiz-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #374151;
            padding-bottom: 11px;
            margin-bottom: 20px;
        }
        .progress-text { color: #f59e0b; font-weight: bold; margin: 0; }
        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 25px; }
        
        .btn-option {
            background-color: #374151;
            border: 1px solid #4b5563;
            text-align: left;
            margin-bottom: 10px;
        }
        .btn-option:hover {
            background-color: #4b5563;
        }
        .participant-card {
            background-color: #374151;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #4b5563;
        }
        .log-item {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .log-correct { background-color: rgba(22,163,74,0.2); }
        .log-incorrect { background-color: rgba(220,38,38,0.2); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Engine Boost Quiz</h1>
            <p style="color: #9ca3af;">Trivia de Turbos y Compresores</p>
        </header>

        <!-- PANTALLA 1: REGISTRO -->
        <div id="screen-register" class="card">
            <h2 style="text-align: center; margin-top: 0;">Registro</h2>
            
            <div class="form-group">
                <label>Nombre del Participante:</label>
                <input type="text" id="player-name" placeholder="Escribe tu nombre">
            </div>
            
            <div class="form-group">
                <label>Selecciona Dificultad:</label>
                <select id="player-difficulty">
                    <option value="easy">Principiante (15 preguntas)</option>
                    <option value="medium">Intermedio (15 preguntas)</option>
                    <option value="hard">Experto (15 preguntas)</option>
                </select>
            </div>
            
            <div class="btn-group">
                <button type="button" id="btn-start" class="btn-blue">Iniciar Mi Turno</button>
                <button type="button" id="btn-final-report" class="btn-green hidden">Ver Informe Final</button>
            </div>
        </div>

        <!-- PANTALLA 2: JUEGO -->
        <div id="screen-quiz" class="card hidden">
            <div class="quiz-header">
                <div>
                    <h3 id="quiz-player-label" style="margin:0; color:white;">Jugador: </h3>
                </div>
                <div>
                    <p class="progress-text" id="quiz-progress">Pregunta 1 de 15</p>
                </div>
            </div>

            <p id="quiz-question" class="question-text"></p>
            <div id="quiz-options"></div>
        </div>

        <!-- PANTALLA 3: INFORME FINAL -->
        <div id="screen-report" class="card hidden">
            <h2 style="color: #4ade80; text-align: center;">Informe de Resultados</h2>
            <div id="report-content"></div>
            <button type="button" id="btn-restart" class="btn-blue" style="margin-top:20px;">Reiniciar Todo</button>
        </div>
    </div>
